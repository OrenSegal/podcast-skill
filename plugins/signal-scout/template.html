<style>
/* Token structure is load-bearing: keep these blocks self-contained.
   Each one redefines the FULL set of tokens — never mix values across

   Do NOT default to warm-cream-bg + serif-headline + terracotta-accent.
   That's the AI-generated cliché this template used to ship (fixed
   2026-07-16 after a user called it slop). Pick a palette and type
   pairing grounded in the report's actual subject instead — see

:root {

  --mid-bg: rgba(214,169,74,0.14);

  --off-bg: rgba(86,90,80,0.16);
}
:root[data-theme="light"] {
  --void: #E4E4DC;
  --panel: #F6F6F1;
  --line: #CFD0C5;
  --ink: #1B1D17;
  --ink-dim: #676B5D;
  --sig: #3F7A2C;
  --sig-bg: rgba(63,122,44,0.10);
  --mid: #96700F;

}

  :root:not([data-theme="dark"]) {
    --void: #E4E4DC;
    --panel: #F6F6F1;
    --line: #CFD0C5;
    --ink: #1B1D17;
    --ink-dim: #676B5D;

    --alert: #A83E23;
    --alert-bg: rgba(168,62,35,0.10);
    --off: #8A8E80;
    --off-bg: rgba(138,142,128,0.14);
  }
}
* { box-sizing: border-box; }
html, body {

  background: var(--void);
